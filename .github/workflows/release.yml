name: GitHub Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        run: echo "${{ secrets.GENERIC_KEY_STORE }}" | base64 -d > "${RUNNER_TEMP}/generic.jks"

      - name: Build generic APK
        run: >
          ./gradlew
          :app:assembleGenericRelease
          -PtasksKeyAlias=${{ secrets.GENERIC_KEY_ALIAS }}
          -PtasksStoreFile=${{ runner.temp }}/generic.jks
          -PtasksStorePassword=${{ secrets.GENERIC_KEY_STORE_PASSWORD }}
          -PtasksKeyPassword=${{ secrets.GENERIC_KEY_PASSWORD }}

      - name: Rename APK
        run: mv app/build/outputs/apk/generic/release/app-generic-release.apk "tasks-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes "tasks-${{ github.ref_name }}.apk"